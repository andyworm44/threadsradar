<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreadsRadar 串文雷達</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 700; }

    .login-section {
      max-width: 420px;
      margin: 60px auto;
      padding: 0 16px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      border: 1px solid #e8e8e8;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .login-card h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }
    .login-card .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #2563eb;
    }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { background: #999; cursor: not-allowed; }
    .warning {
      margin-top: 16px;
      padding: 10px 14px;
      background: #fef3c7;
      border-radius: 8px;
      font-size: 12px;
      color: #92400e;
      line-height: 1.5;
    }

    /* Progress section */
    .progress-section {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .progress-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid #e8e8e8;
    }
    .progress-card h3 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .progress-log {
      background: #f9fafb;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      color: #555;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.8;
      font-family: "SF Mono", Monaco, monospace;
    }
    .progress-log .line { padding: 2px 0; }
    .progress-log .line:last-child { color: #000; font-weight: 600; }
    .progress-spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ddd;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      margin-top: 12px;
      padding: 10px 14px;
      background: #fef2f2;
      border-radius: 8px;
      font-size: 13px;
      color: #dc2626;
    }
    .back-btn {
      margin-top: 16px;
      padding: 8px 20px;
      background: #f3f4f6;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Results */
    .results-header {
      max-width: 680px;
      margin: 20px auto 0;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .results-header h2 { font-size: 16px; }
    .results-header .count { font-size: 13px; color: #888; margin-left: auto; }
    .new-scrape-btn {
      padding: 6px 14px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
    }

    .filter-bar { max-width: 680px; margin: 12px auto 0; padding: 0 16px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
    .filter-label { font-size: 11px; color: #aaa; white-space: nowrap; }
    .tab {
      padding: 5px 14px; border-radius: 20px; font-size: 13px;
      cursor: pointer; background: #fff; border: 1px solid #ddd; color: #555;
      transition: all 0.15s;
    }
    .tab.active, .tab:hover { background: #2563eb; border-color: #2563eb; color: #fff; }

    main { max-width: 680px; margin: 12px auto 60px; padding: 0 16px; }

    .card {
      background: #fff; border-radius: 12px; padding: 14px;
      margin-bottom: 8px; border: 1px solid #e8e8e8;
    }
    .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .tag { font-size: 11px; background: #f0f0f0; color: #666; padding: 2px 8px; border-radius: 10px; }
    .time-ago { font-size: 12px; color: #aaa; }
    .card p { font-size: 14px; line-height: 1.7; color: #333; white-space: pre-wrap; }
    .card-footer {
      display: flex; align-items: center; gap: 14px;
      margin-top: 10px; padding-top: 8px; border-top: 1px solid #f0f0f0;
    }
    .stat { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #888; }
    .stat-num { font-weight: 700; color: #333; }
    .view-link { margin-left: auto; font-size: 12px; color: #0066cc; text-decoration: none; }
    .view-link:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 60px 20px; color: #888; }
    .count-bar { font-size: 12px; color: #aaa; margin-bottom: 10px; }
  </style>
</head>
<body>
  <header>
    <span>📡</span>
    <h1>ThreadsRadar 串文雷達</h1>
  </header>

  <!-- Login Form -->
  <div id="login-view" class="login-section">
    <div class="login-card">
      <h2>開始爬取 Threads</h2>
      <p class="subtitle">輸入你的 Threads / Instagram 帳號密碼，系統會在伺服器上登入並爬取你首頁的熱門貼文。</p>
      <form id="login-form" onsubmit="startScrape(event)">
        <div class="form-group">
          <label for="username">帳號（Instagram 用戶名）</label>
          <input type="text" id="username" placeholder="your_username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">密碼</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="form-group">
          <label for="totp">雙重驗證碼（如有開啟 2FA）</label>
          <input type="text" id="totp" placeholder="6 位數驗證碼（選填）" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code">
        </div>
        <div class="form-group">
          <label for="mode">爬取模式</label>
          <select id="mode">
            <option value="feed">僅首頁動態（較快）</option>
            <option value="keyword">首頁 + 關鍵字搜尋（較完整）</option>
          </select>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">開始爬取</button>
      </form>
      <div class="warning">
        ⚠️ 你的密碼只會在伺服器記憶體中暫存，不會被記錄或儲存。爬取完成後立即清除。<br>
        ⚠️ 因為是從雲端伺服器連線，Threads 可能會要求驗證或擋住登入。如遇到問題請稍後再試。
      </div>
    </div>
  </div>

  <!-- Progress View -->
  <div id="progress-view" class="progress-section" style="display:none;">
    <div class="progress-card">
      <h3><span class="progress-spinner"></span>爬取進行中...</h3>
      <div class="progress-log" id="progress-log"></div>
      <div id="error-area"></div>
      <button class="back-btn" id="back-btn" style="display:none;" onclick="showLogin()">返回重新爬取</button>
    </div>
  </div>

  <!-- Results View -->
  <div id="results-view" style="display:none;">
    <div class="results-header">
      <span>📊</span>
      <h2>爬取結果</h2>
      <span class="count" id="result-count"></span>
      <button class="new-scrape-btn" onclick="showLogin()">重新爬取</button>
    </div>
    <div class="filter-bar">
      <div class="filter-row">
        <span class="filter-label">時間</span>
        <div id="time-tabs"></div>
      </div>
    </div>
    <main id="main"></main>
  </div>

  <script>
    let allPosts = [];
    let currentTime = '12h';

    const TIME_FILTERS = [
      { id: '1h',  label: '1 小時',  hours: 1 },
      { id: '3h',  label: '3 小時',  hours: 3 },
      { id: '6h',  label: '6 小時',  hours: 6 },
      { id: '12h', label: '12 小時', hours: 12 },
      { id: '24h', label: '24 小時', hours: 24 },
    ];

    function showLogin() {
      document.getElementById('login-view').style.display = '';
      document.getElementById('progress-view').style.display = 'none';
      document.getElementById('results-view').style.display = 'none';
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = '開始爬取';
      document.getElementById('progress-log').innerHTML = '';
      document.getElementById('error-area').innerHTML = '';
      document.getElementById('back-btn').style.display = 'none';
    }

    function showProgress() {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('progress-view').style.display = '';
      document.getElementById('results-view').style.display = 'none';
    }

    function showResults(data) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('progress-view').style.display = 'none';
      document.getElementById('results-view').style.display = '';
      document.getElementById('result-count').textContent = `更新：${data.updated}  共 ${data.total} 篇`;
      allPosts = data.posts || [];
      buildTimeTabs();
      render();
    }

    function addLog(msg) {
      const log = document.getElementById('progress-log');
      const line = document.createElement('div');
      line.className = 'line';
      line.textContent = msg;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    async function startScrape(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const mode = document.getElementById('mode').value;

      if (!username || !password) return;

      document.getElementById('submit-btn').disabled = true;
      document.getElementById('submit-btn').textContent = '連線中...';

      try {
        const res = await fetch('/api/scrape', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, mode, totp: document.getElementById('totp').value.trim() }),
        });

        if (!res.ok) {
          const err = await res.json();
          alert(err.error || '發生錯誤');
          document.getElementById('submit-btn').disabled = false;
          document.getElementById('submit-btn').textContent = '開始爬取';
          return;
        }

        const { session_id } = await res.json();
        // Clear password from DOM
        document.getElementById('password').value = '';

        showProgress();
        addLog('已建立連線，等待伺服器回應...');

        // Connect SSE
        const evtSource = new EventSource(`/api/stream/${session_id}`);
        evtSource.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === 'progress') {
            addLog(msg.message);
          } else if (msg.type === 'done') {
            evtSource.close();
            addLog('爬取完成！');
            setTimeout(() => showResults(msg.data), 800);
          } else if (msg.type === 'error') {
            evtSource.close();
            document.getElementById('error-area').innerHTML =
              `<div class="error-msg">錯誤：${escapeHtml(msg.message)}</div>`;
            document.getElementById('back-btn').style.display = '';
            document.querySelector('.progress-spinner')?.remove();
          }
        };
        evtSource.onerror = () => {
          evtSource.close();
          document.getElementById('error-area').innerHTML =
            '<div class="error-msg">連線中斷，請重試</div>';
          document.getElementById('back-btn').style.display = '';
        };
      } catch {
        alert('無法連線到伺服器');
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').textContent = '開始爬取';
      }
    }

    function toHoursAgo(post) {
      if (post.datetime) {
        const d = new Date(post.datetime);
        if (!isNaN(d)) return (Date.now() - d.getTime()) / 3600000;
      }
      const t = (post.time_text || '').trim();
      if (!t) return null;
      const mh = t.match(/^(\d+)h$/i); if (mh) return parseInt(mh[1]);
      const mm = t.match(/^(\d+)m$/i); if (mm) return parseInt(mm[1]) / 60;
      const md = t.match(/^(\d+)d$/i); if (md) return parseInt(md[1]) * 24;
      const mw = t.match(/^(\d+)w$/i); if (mw) return parseInt(mw[1]) * 24 * 7;
      return null;
    }

    function buildTimeTabs() {
      const timeEl = document.getElementById('time-tabs');
      timeEl.innerHTML = '';
      timeEl.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;';
      TIME_FILTERS.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (f.id === currentTime ? ' active' : '');
        btn.textContent = f.label;
        btn.onclick = () => {
          currentTime = f.id;
          document.querySelectorAll('#time-tabs .tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          render();
        };
        timeEl.appendChild(btn);
      });
    }

    function formatNum(n) {
      if (!n) return '0';
      if (n >= 10000) return (n/10000).toFixed(1) + '萬';
      if (n >= 1000) return (n/1000).toFixed(1) + 'K';
      return String(n);
    }

    function render() {
      const main = document.getElementById('main');
      const tf = TIME_FILTERS.find(f => f.id === currentTime);
      let posts = allPosts.filter(p => {
        const h = toHoursAgo(p);
        return h !== null && h <= tf.hours;
      });
      posts = [...posts].sort((a, b) => (b.likes || 0) - (a.likes || 0));
      main.innerHTML = '';

      if (posts.length === 0) {
        main.innerHTML = '<div class="empty">這個時間範圍內沒有文章</div>';
        return;
      }

      const countBar = document.createElement('div');
      countBar.className = 'count-bar';
      countBar.textContent = `共 ${posts.length} 篇`;
      main.appendChild(countBar);

      posts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'card';
        const hasStats = post.likes > 0 || post.replies > 0 || post.reposts > 0;
        card.innerHTML = `
          <div class="card-meta">
            ${post.time_bucket ? `<span class="tag">${post.time_bucket}</span>` : ''}
            ${post.username ? `<span class="tag" style="background:#f0fdf4;color:#16a34a">@${escapeHtml(post.username)}</span>` : ''}
            ${post.time_text ? `<span class="time-ago">🕐 ${post.time_text} 前</span>` : ''}
          </div>
          <p>${escapeHtml(post.text)}</p>
          <div class="card-footer">
            ${hasStats ? `
              <span class="stat">❤️ <span class="stat-num">${formatNum(post.likes)}</span></span>
              <span class="stat">💬 <span class="stat-num">${formatNum(post.replies)}</span></span>
              <span class="stat">🔁 <span class="stat-num">${formatNum(post.reposts)}</span></span>
            ` : '<span class="stat" style="color:#ccc">無互動數據</span>'}
            ${post.url ? `<a class="view-link" href="${post.url}" target="_blank">查看原文 →</a>` : ''}
          </div>
        `;
        main.appendChild(card);
      });
    }

    function escapeHtml(t) {
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
