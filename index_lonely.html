<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孤單寂寞交友雷達</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #e0e0f0; }

    header {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 700; color: #c084fc; }
    #updated { font-size: 12px; color: #666; margin-left: auto; }
    .refresh-btn {
      background: #2a2a4a; color: #c084fc; border: 1px solid #4a4a7a;
      padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
    }
    .scrape-btn {
      background: #7c3aed; color: #fff; border: none;
      padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
    }
    .scrape-btn:disabled { background: #4a2a7a; color: #aaa; cursor: not-allowed; }

    .filter-bar { max-width: 680px; margin: 12px auto 0; padding: 0 16px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
    .filter-label { font-size: 11px; color: #666; white-space: nowrap; }

    .tab {
      padding: 5px 14px; border-radius: 20px; font-size: 13px;
      cursor: pointer; background: #1a1a2e; border: 1px solid #2a2a4a; color: #888;
      transition: all 0.15s;
    }
    .tab.active, .tab:hover { background: #7c3aed; color: #fff; border-color: #7c3aed; }

    main { max-width: 680px; margin: 12px auto 60px; padding: 0 16px; }

    .card {
      background: #1a1a2e; border-radius: 12px; padding: 14px;
      margin-bottom: 8px; border: 1px solid #2a2a4a;
    }
    .card:hover { border-color: #7c3aed; }
    .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .tag { font-size: 11px; background: #2a2a4a; color: #c084fc; padding: 2px 8px; border-radius: 10px; }
    .tag-user { background: #1a2e1a; color: #4ade80; }
    .time-ago { font-size: 12px; color: #555; }
    .rank { font-size: 13px; font-weight: 700; color: #7c3aed; min-width: 32px; }
    .card p { font-size: 14px; line-height: 1.7; color: #ccc; white-space: pre-wrap; }
    .card-footer {
      display: flex; align-items: center; gap: 14px;
      margin-top: 10px; padding-top: 8px; border-top: 1px solid #2a2a4a;
    }
    .stat { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #666; }
    .stat-num { font-weight: 700; color: #e0e0f0; }
    .view-link { margin-left: auto; font-size: 12px; color: #c084fc; text-decoration: none; }
    .view-link:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 60px 20px; color: #555; }
    .loading { text-align: center; padding: 60px; color: #555; }
    .count-bar { font-size: 12px; color: #555; margin-bottom: 10px; }

    .likes-bar {
      height: 3px; background: #2a2a4a; border-radius: 2px; margin-top: 8px;
    }
    .likes-bar-fill {
      height: 100%; background: linear-gradient(90deg, #7c3aed, #ec4899);
      border-radius: 2px; transition: width 0.3s;
    }
  </style>
</head>
<body>
  <header>
    <span>💜</span>
    <h1>孤單寂寞交友雷達</h1>
    <span id="updated"></span>
    <button class="refresh-btn" onclick="location.reload()">重新整理</button>
    <button class="scrape-btn" id="scrape-btn" onclick="runScrape()">重新爬取</button>
  </header>

  <div class="filter-bar">
    <div class="filter-row">
      <span class="filter-label">顯示</span>
      <div id="range-tabs"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">最低讚數</span>
      <div id="likes-tabs"></div>
    </div>
  </div>

  <main id="main"><div class="loading">載入中...</div></main>

  <script>
    let allPosts = [];
    let currentRange = 'all';
    let currentMinLikes = 0;
    let maxLikes = 0;

    const RANGE_FILTERS = [
      { id: 'all', label: '全部' },
      { id: '24h', label: '24 小時', hours: 24 },
      { id: '7d',  label: '7 天',   hours: 24 * 7 },
      { id: '30d', label: '30 天',  hours: 24 * 30 },
    ];

    const LIKES_FILTERS = [
      { id: 0,    label: '全部' },
      { id: 100,  label: '100+' },
      { id: 500,  label: '500+' },
      { id: 1000, label: '1K+' },
      { id: 5000, label: '5K+' },
    ];

    function toHoursAgo(post) {
      if (post.datetime) {
        const d = new Date(post.datetime);
        if (!isNaN(d)) return (Date.now() - d.getTime()) / 3600000;
      }
      const t = (post.time_text || '').trim();
      if (!t) return null;
      const mh = t.match(/^(\d+)h$/i); if (mh) return parseInt(mh[1]);
      const mm = t.match(/^(\d+)m$/i); if (mm) return parseInt(mm[1]) / 60;
      const md = t.match(/^(\d+)d$/i); if (md) return parseInt(md[1]) * 24;
      const mw = t.match(/^(\d+)w$/i); if (mw) return parseInt(mw[1]) * 24 * 7;
      return null;
    }

    async function load() {
      try {
        const res = await fetch('data_lonely.json?t=' + Date.now());
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById('updated').textContent = '更新：' + data.updated;
        allPosts = data.posts || [];
        maxLikes = allPosts.length > 0 ? allPosts[0].likes : 0;

        // Range tabs
        const rangeEl = document.getElementById('range-tabs');
        rangeEl.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;';
        RANGE_FILTERS.forEach(f => {
          const btn = document.createElement('button');
          btn.className = 'tab' + (f.id === currentRange ? ' active' : '');
          btn.textContent = f.label;
          btn.onclick = () => {
            currentRange = f.id;
            document.querySelectorAll('#range-tabs .tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render();
          };
          rangeEl.appendChild(btn);
        });

        // Likes tabs
        const likesEl = document.getElementById('likes-tabs');
        likesEl.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;';
        LIKES_FILTERS.forEach(f => {
          const btn = document.createElement('button');
          btn.className = 'tab' + (f.id === currentMinLikes ? ' active' : '');
          btn.textContent = f.label;
          btn.onclick = () => {
            currentMinLikes = f.id;
            document.querySelectorAll('#likes-tabs .tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render();
          };
          likesEl.appendChild(btn);
        });

        render();
      } catch {
        document.getElementById('main').innerHTML = '<div class="empty">尚無資料，請執行 python3 scraper_lonely.py</div>';
      }
    }

    function formatNum(n) {
      if (!n) return '0';
      if (n >= 10000) return (n / 10000).toFixed(1) + '萬';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return String(n);
    }

    function render() {
      const main = document.getElementById('main');
      const rf = RANGE_FILTERS.find(f => f.id === currentRange);

      let posts = allPosts.filter(p => {
        if (rf.hours) {
          const h = toHoursAgo(p);
          if (h === null || h > rf.hours) return false;
        }
        return (p.likes || 0) >= currentMinLikes;
      });

      main.innerHTML = '';

      if (posts.length === 0) {
        main.innerHTML = '<div class="empty">沒有符合條件的文章</div>';
        return;
      }

      const countBar = document.createElement('div');
      countBar.className = 'count-bar';
      countBar.textContent = `共 ${posts.length} 篇，最高 ❤️ ${formatNum(posts[0]?.likes || 0)}`;
      main.appendChild(countBar);

      posts.forEach((post, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        const hasStats = post.likes > 0 || post.replies > 0 || post.reposts > 0;
        const likePct = maxLikes > 0 ? Math.round((post.likes / maxLikes) * 100) : 0;
        card.innerHTML = `
          <div class="card-meta">
            <span class="rank">#${idx + 1}</span>
            ${post.username ? `<span class="tag tag-user">@${escapeHtml(post.username)}</span>` : ''}
            ${post.time_text ? `<span class="time-ago">🕐 ${escapeHtml(post.time_text)}</span>` : ''}
          </div>
          <p>${escapeHtml(post.text)}</p>
          <div class="likes-bar"><div class="likes-bar-fill" style="width:${likePct}%"></div></div>
          <div class="card-footer">
            ${hasStats ? `
              <span class="stat">❤️ <span class="stat-num">${formatNum(post.likes)}</span></span>
              <span class="stat">💬 <span class="stat-num">${formatNum(post.replies)}</span></span>
              <span class="stat">🔁 <span class="stat-num">${formatNum(post.reposts)}</span></span>
            ` : '<span class="stat" style="color:#333">無互動數據</span>'}
            ${post.url ? `<a class="view-link" href="${post.url}" target="_blank">查看原文 →</a>` : ''}
          </div>
        `;
        main.appendChild(card);
      });
    }

    function escapeHtml(t) {
      return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function runScrape() {
      const btn = document.getElementById('scrape-btn');
      btn.disabled = true;
      btn.textContent = '爬取中...';
      try {
        await fetch('/api/scrape', { method: 'POST' });
        const poll = setInterval(async () => {
          const res = await fetch('/api/status');
          const { scraping } = await res.json();
          if (!scraping) {
            clearInterval(poll);
            btn.disabled = false;
            btn.textContent = '重新爬取';
            await load();
          }
        }, 5000);
      } catch {
        btn.disabled = false;
        btn.textContent = '重新爬取';
      }
    }

    load();
  </script>
</body>
</html>
